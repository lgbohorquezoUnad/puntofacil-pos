<!DOCTYPE html>
<html lang="es">
<head>
    <title>PuntoFacil - Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #194a78 0%, #2563eb 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", sans-serif;
            margin: 0;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-title {
            color: #194a78;
            font-weight: 800;
            font-size: 28px;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #d1d5db;
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
            border-color: #2563eb;
        }
        .btn-login {
            background: #2563eb;
            color: white;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            width: 100%;
            border: none;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #1d4ed8;
        }
        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <i class="bi bi-shop-window" style="font-size: 40px; color: #f59e0b;"></i>
        <div class="login-title">PuntoFacil POS</div>
        <div style="color: #6b7280; font-size: 14px;">Ingresa tus credenciales para continuar</div>
    </div>
    
    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label fw-bold" style="color: #4b5563;">Correo electrónico</label>
            <input type="email" id="email" class="form-control" required placeholder="admin@puntofacil.com">
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold" style="color: #4b5563;">Contraseña</label>
            <input type="password" id="password" class="form-control" required placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn-login" id="submitBtn">
            Iniciar Sesión <i class="bi bi-box-arrow-in-right ms-1"></i>
        </button>
        <div id="errorMessage" class="error-message"></div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../static/js/ui.js"></script>
<script src="../static/js/auth.js"></script>
<script src="../static/js/login.js"></script>
</body>
</html>
