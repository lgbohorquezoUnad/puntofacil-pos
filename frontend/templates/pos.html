<!DOCTYPE html>
<html lang="es">

<head>
    <title>PuntoFacil POS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../static/css/app-shell.css" rel="stylesheet">

    <style>
        :root {
            --bg: #dde3e9;
            --panel: #f8fafc;
            --line: #d6dde5;
            --brand: #194a78;
            --brand-soft: #2f6fa8;
            --text: #1f2937;
            --muted: #6b7280;
            --selected: #f59e0b;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --panel: #1e293b;
            --line: #334155;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --selected: #f59e0b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", sans-serif;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        .header {
            background: linear-gradient(90deg, var(--brand) 0%, var(--brand-soft) 100%);
            color: white;
            padding: 6px 12px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(25, 74, 120, 0.15);
        }

        .header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            max-width: 1340px;
            margin: 0 auto;
        }

        .header-badge {
            font-size: 9px;
            padding: 3px 7px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            white-space: nowrap;
        }

        .pos-shell {
            max-width: 1340px;
            margin: 0 auto;
            padding: 8px;
            height: calc(100vh - 42px);
        }

        .app-row {
            height: 100%;
        }

        .card {
            border: none;
            border-radius: 10px;
            background: var(--panel);
            box-shadow: 0 6px 14px rgba(15, 23, 42, 0.06);
            overflow: hidden;
        }

        .card-header {
            border: none;
            padding: 6px 10px;
            font-weight: 700;
            font-size: 11px;
        }

        .card-body {
            padding: 7px 9px;
        }

        .cart-card .card-header {
            background: #1f6fe5;
            color: white;
        }

        .history-card .card-header {
            background: #5f6b77;
            color: white;
        }

        .products-card .card-header {
            background: var(--panel);
            border-bottom: 1px solid var(--line);
        }

        .cash-card .card-header {
            background: #18b6d8;
            color: #083344;
        }

        .actions-card .card-header {
            background: #101820;
            color: white;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--muted);
            padding: 3px 5px;
        }

        .table td,
        .table th {
            vertical-align: middle;
            font-size: 10px;
            padding: 3px 5px;
        }

        .total-box {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid var(--line);
            font-size: 13px;
            font-weight: 800;
            text-align: right;
        }

        .cart-name {
            font-weight: 700;
        }

        .cart-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .qty-btn,
        .remove-btn {
            border: none;
            border-radius: 6px;
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
        }

        .qty-btn {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .remove-btn {
            background: #fee2e2;
            color: #b91c1c;
        }

        .qty-value {
            min-width: 18px;
            text-align: center;
            font-weight: 700;
        }

        .filters-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 150px;
            gap: 8px;
        }

        .search-wrap {
            position: relative;
        }

        .search-wrap i {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 11px;
        }

        .search-input,
        .category-select {
            padding: 6px 10px 6px 28px;
            border-radius: 9px;
            border: 1px solid var(--line);
            background: var(--panel);
            color: var(--text);
            font-size: 11px;
            height: 30px;
        }

        .category-select {
            padding: 6px 10px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }

        .product-card {
            height: 100%;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            border: 1px solid rgba(214, 221, 229, 0.9);
        }

        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(30, 64, 175, 0.1);
        }

        .product-card .card-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 90px;
            padding: 8px 6px;
            gap: 2px;
        }

        .product-name {
            font-size: 12px;
            font-weight: 700;
            margin: 0;
            line-height: 1.1;
        }

        .product-stock {
            font-size: 10px;
            color: var(--muted);
            margin: 0;
        }

        .product-price {
            font-size: 12px;
            font-weight: 800;
            color: #15803d;
            margin: 0;
        }

        .product-add-btn {
            padding: 4px 8px;
            border: none;
            border-radius: 7px;
            background: #2563eb;
            color: white;
            font-weight: 700;
            font-size: 10px;
        }

        .status-box {
            border-radius: 8px;
            padding: 7px;
            background: var(--panel);
            color: var(--text);
            border: 1px solid var(--line);
            line-height: 1.35;
            font-size: 10px;
        }

        .payment-status {
            margin-top: 5px;
            padding: 5px 6px;
            border-radius: 8px;
            background: #fff7ed;
            border: 1px solid #fed7aa;
            font-size: 10px;
            font-weight: 700;
            color: #9a3412;
        }

        .form-label {
            font-size: 10px;
            font-weight: 700;
            color: #475569;
            margin-bottom: 2px;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid var(--line);
            padding: 5px 8px;
            font-size: 11px;
            background: var(--panel);
            color: var(--text);
            height: 28px;
        }

        .cash-btn,
        .checkout-btn {
            width: 100%;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .cash-btn {
            padding: 6px 8px;
            font-size: 10px;
        }

        .right-rail {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 6px;
            height: 100%;
        }

        .cash-card .card-body {
            padding: 7px 9px;
        }

        .actions-card {
            min-height: 0;
        }

        .actions-card .card-body {
            padding: 6px;
            display: flex;
            flex-direction: column;
            height: calc(100% - 31px);
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 5px;
        }

        .payment-tile {
            border: none;
            border-radius: 8px;
            height: 44px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
            font-size: 8px;
            font-weight: 700;
            padding: 3px;
            transition: transform 0.15s ease, box-shadow 0.15s ease, outline 0.15s ease;
        }

        .payment-tile.selected {
            outline: 2px solid var(--selected);
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
            transform: translateY(-1px);
        }

        .payment-tile i {
            font-size: 12px;
        }

        .payment-tile.cash {
            background: #1e8e4f;
        }

        .payment-tile.transfer {
            background: #246ee9;
        }

        .payment-tile.nequi {
            background: #20262d;
        }

        .payment-tile.davi {
            background: #e23343;
        }

        .payment-tile.card {
            background: #7b8691;
        }

        .checkout-inline {
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
        }

        .checkout-summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 10px;
            font-weight: 700;
            color: #111827;
        }

        .checkout-amount {
            font-size: 14px;
            font-weight: 800;
            color: #111827;
        }

        .checkout-btn {
            padding: 8px 10px;
            background: #f4c430;
            color: #111827;
            font-size: 12px;
        }

        .history-table td,
        .history-table th {
            font-size: 9px;
            white-space: nowrap;
        }

        .left-col,
        .center-col,
        .right-col {
            height: 100%;
        }

        .left-stack,
        .center-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 100%;
        }

        .center-stack .card,
        .left-stack .card {
            flex: 1;
            min-height: 0;
        }

        .history-card .card-body,
        .cart-card .card-body {
            height: calc(100% - 29px);
        }

        @media (max-width: 991px) {
            body {
                overflow: auto;
            }

            .pos-shell {
                height: auto;
            }

            .left-col,
            .center-col,
            .right-col {
                height: auto;
            }

            .products-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .header-bar {
                flex-direction: column;
                align-items: flex-start;
            }

            .right-rail {
                display: flex;
            }

            .filters-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 575px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
            [data-app-mode="simple"] [data-mode="advanced"] {
            display: none !important;
        }

        [data-app-mode="advanced"] [data-mode="simple"] {
            display: none !important;
        }

    </style>
</head>

<body>
    <div class="header">
        <div class="header-bar">
            <div><i class="bi bi-shop-window me-1"></i>PuntoFacil POS</div>
            <div class="d-flex align-items-center gap-2">
                <div class="header-badge d-none d-md-block"><i class="bi bi-lightning-charge-fill me-1"></i>Ventas, caja e historial en una sola vista</div>
                <button id="themeToggle" class="btn btn-sm btn-outline-light py-0 px-2" style="font-size:11px;" onclick="UI.toggleTheme()">
                    <i class="bi bi-moon-fill"></i>
                </button>
                <button id="modeToggle" class="btn btn-sm btn-light py-0 px-2" style="font-size:11px;" onclick="UI.toggleMode()">Modo: Simple</button>
                <a class="btn btn-sm btn-light py-0 px-2" style="font-size:11px;" href="/admin"><i class="bi bi-speedometer2 me-1"></i>Admin</a>
                <a class="btn btn-sm btn-light py-0 px-2" style="font-size:11px;" href="/inventory"><i class="bi bi-box-seam me-1"></i>Inventario</a>
                <button class="btn btn-sm btn-danger py-0 px-2" style="font-size:11px;" onclick="Auth.logout()"><i
                        class="bi bi-box-arrow-right me-1"></i>Salir</button>
            </div>
        </div>
    </div>

    <div class="pos-shell">
        <div class="row g-2 app-row align-items-stretch">

            <div class="col-12 col-lg-3 left-col">
                <div class="left-stack">
                    <div class="card cart-card">
                        <div class="card-header"><i class="bi bi-cart3 me-1"></i>Carrito de ventas</div>
                        <div class="card-body">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Producto</th>
                                        <th>Cant</th>
                                        <th>Total</th>
                                    </tr>
                                </thead>
                                <tbody id="cartItems"></tbody>
                            </table>
                            <div class="total-box">Total: $<span id="total">0</span></div>
                        </div>
                    </div>

                    <div class="card history-card">
                        <div class="card-header"><i class="bi bi-clock-history me-1"></i>Historial reciente</div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-sm history-table">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>Fecha</th>
                                            <th>Pago</th>
                                            <th>Total</th>
                                        </tr>
                                    </thead>
                                    <tbody id="salesHistory"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-6 center-col">
                <div class="center-stack">
                    <div class="card products-card">
                        <div class="card-header">
                            <div class="filters-row">
                                <div class="search-wrap">
                                    <i class="bi bi-search"></i>
                                    <input id="searchProduct" class="form-control search-input"
                                        placeholder="Buscar producto..." onkeyup="applyFilters()">
                                </div>
                                <select id="categoryFilter" class="form-select category-select"
                                    onchange="applyFilters()">
                                    <option value="">Todas las categorias</option>
                                </select>
                            </div>
                        </div>
                        <div class="card-body">
                            <div id="productList" class="products-grid"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-3 right-col">
                <div class="right-rail">
                    <div class="card cash-card">
                        <div class="card-header"><i class="bi bi-safe2 me-1"></i>Caja</div>
                        <div class="card-body">
                            <div id="cashRegisterStatus" class="status-box">Sin datos de caja</div>
                            <div class="payment-status" id="selectedPaymentStatus">Metodo de pago: No seleccionado</div>
                            <div class="mt-2 mb-1">
                                <label class="form-label">Monto apertura</label>
                                <input id="openingAmount" type="number" class="form-control" min="0" step="0.01"
                                    placeholder="0.00">
                            </div>
                            <button class="btn btn-success cash-btn" onclick="openCashRegister()"><i
                                    class="bi bi-unlock"></i><span>Abrir caja</span></button>
                            <div class="mt-2 mb-1">
                                <label class="form-label">Monto cierre</label>
                                <input id="closingAmount" type="number" class="form-control" min="0" step="0.01"
                                    placeholder="0.00">
                            </div>
                            <button class="btn btn-danger cash-btn" onclick="closeCashRegister()"><i
                                    class="bi bi-lock"></i><span>Cerrar caja</span></button>
                        </div>
                    </div>

                    <div class="card actions-card">
                        <div class="card-header"><i class="bi bi-grid-3x3-gap me-1"></i>Metodos de pago</div>
                        <div class="card-body">
                            <div class="action-grid">
                                <button class="payment-tile cash" data-method="Efectivo"
                                    onclick="setPayment('Efectivo')">
                                    <i class="bi bi-cash-stack"></i>
                                    <span>Efectivo</span>
                                </button>
                                <button class="payment-tile transfer" data-method="Transferencia"
                                    onclick="setPayment('Transferencia')">
                                    <i class="bi bi-bank"></i>
                                    <span>Transferencia</span>
                                </button>
                                <button class="payment-tile nequi" data-mode="advanced" data-method="Nequi" onclick="setPayment('Nequi')">
                                    <i class="bi bi-phone"></i>
                                    <span>Nequi</span>
                                </button>
                                <button class="payment-tile davi" data-method="Daviplata"
                                    onclick="setPayment('Daviplata')">
                                    <i class="bi bi-wallet2"></i>
                                    <span>Daviplata</span>
                                </button>
                                <button class="payment-tile card" data-mode="advanced" data-method="Tarjeta" onclick="setPayment('Tarjeta')">
                                    <i class="bi bi-credit-card"></i>
                                    <span>Tarjeta</span>
                                </button>
                            </div>
                            <div class="checkout-inline">
                                <div class="checkout-summary">
                                    <span><i class="bi bi-receipt-cutoff me-1"></i>Listo</span>
                                    <span class="checkout-amount">$<span id="checkoutTotalMirror">0</span></span>
                                </div>
                                <button class="checkout-btn" onclick="checkout()"><i
                                        class="bi bi-bag-check-fill"></i><span>COBRAR</span></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../static/js/ui.js"></script>
<script src="../static/js/config.js"></script>
    <script src="../static/js/auth.js"></script>
    <script src="../static/js/pos.js"></script>
    <script>
        const totalSource = document.getElementById("total")
        const totalMirror = document.getElementById("checkoutTotalMirror")
        const observer = new MutationObserver(() => {
            totalMirror.textContent = totalSource.textContent
        })
        observer.observe(totalSource, { childList: true })
        totalMirror.textContent = totalSource.textContent
    </script>
</body>

</html>
